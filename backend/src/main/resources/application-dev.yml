spring:
  datasource:
    url: jdbc:mysql://localhost:3306/private_kitchen?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password:        # 你的密码，没有就留空
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never   # 不执行 SQL 脚本

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.kitchen.backend_springbook_kichen.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl